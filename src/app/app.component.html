<mat-sidenav-container class="sidenav-container">

  <!-- Sidebar -->
  <mat-sidenav #drawer [mode]="'side'" [opened]="sidenavOpen" class="sidenav">
    <div class="sidenav-header">
      <mat-icon class="brand-icon">speed</mat-icon>
      <div class="brand-text">
        <span class="brand-name">Progress</span>
        <span class="brand-sub">Tracker</span>
      </div>
    </div>

    <nav class="nav-list">
      <div class="nav-group" *ngFor="let group of filteredNavGroups">
        <div class="nav-group-label">{{ group.label }}</div>
        <a *ngFor="let item of group.items" [routerLink]="item.route" routerLinkActive="active-nav"
          class="nav-item" mat-ripple>
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      </div>
    </nav>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content class="main-content">

    <!-- Topbar -->
    <mat-toolbar class="topbar">
      <button mat-icon-button (click)="sidenavOpen = !sidenavOpen" class="menu-btn">
        <mat-icon>{{ sidenavOpen ? 'menu_open' : 'menu' }}</mat-icon>
      </button>
      <span class="toolbar-spacer"></span>

      <div class="topbar-actions" style="display: flex; align-items: center; position: relative;">
        <!-- User Dropdown Menu Toggle -->
        <button type="button" class="user-profile" (click)="onUserClick($event)" style="background:none;border:none;cursor:pointer;padding:0;margin-left:15px;display:flex;align-items:center;gap:4px;">
            <div class="avatar" style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px;">
                {{ userInitials }}
            </div>
            <mat-icon style="color: #666;">arrow_drop_down</mat-icon>
        </button>

        <!-- User Dropdown Menu -->
        <div class="user-profile-dropdown" *ngIf="showUserDropdown" style="position: absolute; top: 50px; right: 0; background: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15); min-width: 320px; z-index: 1000; text-align: left; font-family: inherit;">
            <div class="user-menu__content" style="padding: 0;">
                <div class="user-menu__card" style="padding: 0;">
                    <div class="user-menu__profile" style="display: flex; align-items: center; gap: 16px; padding: 20px; border-bottom: 1px solid #f0f0f0;">
                        <div class="user-menu__avatar" style="width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 20px; flex-shrink: 0;">
                            {{ userInitials }}
                        </div>
                        <div class="user-menu__info" style="flex: 1; min-width: 0;">
                            <div class="user-menu__name" style="font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                {{ userDetails.name || 'User' }}
                            </div>
                            <div class="user-menu__email" *ngIf="userDetails.email" style="font-size: 13px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                {{ userDetails.email }}
                            </div>
                        </div>
                    </div>

                    <div class="user-menu__list" *ngIf="userDetails.role || userDetails.department || userDetails.designation" style="padding: 12px 20px; border-bottom: 1px solid #f0f0f0;">
                        <div class="user-menu__row" *ngIf="userDetails.role" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 14px; border-bottom: 1px solid #f5f5f5;">
                            <span class="user-menu__label" style="color: #666; font-weight: 500; min-width: 100px;">Role</span>
                            <span class="user-menu__value" style="color: #1a1a1a; font-weight: 600; text-align: right; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                {{ userDetails.role }}
                            </span>
                        </div>
                        <div class="user-menu__row" *ngIf="userDetails.department" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 14px; border-bottom: 1px solid #f5f5f5;">
                            <span class="user-menu__label" style="color: #666; font-weight: 500; min-width: 100px;">Department</span>
                            <span class="user-menu__value" style="color: #1a1a1a; font-weight: 600; text-align: right; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                {{ userDetails.department }}
                            </span>
                        </div>
                        <div class="user-menu__row" *ngIf="userDetails.designation" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 14px; border-bottom: 1px solid #f5f5f5;">
                            <span class="user-menu__label" style="color: #666; font-weight: 500; min-width: 100px;">Designation</span>
                            <span class="user-menu__value" style="color: #1a1a1a; font-weight: 600; text-align: right; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                {{ userDetails.designation }}
                            </span>
                        </div>
                    </div>

                    <button type="button" class="user-menu__signout" (click)="logout(); $event.stopPropagation()" (mouseenter)="onSignoutHover(true)" (mouseleave)="onSignoutHover(false)" [style.background-color]="signoutHover ? '#fef2f2' : 'transparent'" style="width: 100%; padding: 16px 20px; border: none; display: flex; align-items: center; gap: 12px; color: #dc2626; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; border-radius: 0 0 12px 12px;">
                        <mat-icon style="font-size: 20px; width: 20px; height: 20px;">logout</mat-icon>
                        <span>Sign Out (Close Tab)</span>
                    </button>
                </div>
            </div>
        </div>
      </div>
    </mat-toolbar>

    <!-- Router Outlet -->
    <div class="content-area" *ngIf="isAuthReady">
      <router-outlet></router-outlet>
    </div>
    <div class="content-area" *ngIf="!isAuthReady" style="display: flex; justify-content: center; align-items: center; height: 100%;">
      <mat-progress-bar mode="indeterminate" style="width: 200px;"></mat-progress-bar>
    </div>

  </mat-sidenav-content>
</mat-sidenav-container>
