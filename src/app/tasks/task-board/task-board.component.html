<div class="board-container" (click)="closeMenu()">

  <!-- Header -->
  <div class="board-header">
    <div class="header-left">
      <h1 class="board-title"><mat-icon>view_kanban</mat-icon> Task Board</h1>
    </div>
    <div class="header-filters">
      <div class="jira-search-bar">
        <mat-icon class="search-icon">search</mat-icon>
        <input type="text" [(ngModel)]="searchText" placeholder="Search tasks...">
      </div>

      <!-- Jira-style Avatar Filters -->
      <div class="jira-avatar-filters" *ngIf="uniqueAssignees.length > 0">
        <div class="avatar-group">
          <div class="filter-avatar" *ngFor="let assignee of uniqueAssignees" [matTooltip]="assignee.name"
            [style.background]="assignee.color" [class.selected]="selectedAssigneeIds.has(assignee.id)"
            (click)="toggleAssigneeFilter(assignee.id)">
            {{ assignee.initials }}
          </div>
        </div>
        <button mat-raised-button color="primary" class="jira-create-btn" *ngIf="selectedAssigneeIds.size > 0"
          (click)="clearAssigneeFilters()" style="margin-left: 8px;">Clear filters</button>
      </div>
      <mat-divider vertical class="header-divider" *ngIf="uniqueAssignees.length > 0"></mat-divider>

      <div class="jira-select-wrapper">
        <select class="jira-select" [(ngModel)]="filterPriority">
          <option value="">Priority: All</option>
          <option value="4">Critical</option>
          <option value="3">High</option>
          <option value="2">Medium</option>
          <option value="1">Low</option>
        </select>
        <mat-icon class="select-arrow">expand_more</mat-icon>
      </div>

      <button mat-raised-button color="primary" class="jira-create-btn" routerLink="/tasks/create">
        <mat-icon>add</mat-icon> Add Task
      </button>
    </div>
  </div>

  <!-- Loading -->
  <mat-progress-bar mode="indeterminate" *ngIf="loading"></mat-progress-bar>

  <!-- Kanban Board -->
  <div class="kanban-board" *ngIf="!loading">
    <div class="kanban-column" *ngFor="let col of filteredColumns" [class]="col.colorClass">

      <!-- Column Header -->
      <div class="col-header">
        <div class="col-title">
          <span>{{ col.label }}</span>
          <span class="count-badge" *ngIf="col.tasks.length === col.totalCount">{{ col.totalCount }}</span>
          <span class="count-badge" *ngIf="col.tasks.length !== col.totalCount">{{ col.tasks.length }}/{{ col.totalCount
            }}</span>
        </div>
      </div>

      <!-- Task Cards -->
      <div class="cards-list">
        <div class="task-card" *ngFor="let task of col.tasks" [class.overdue-card]="isOverdue(task)">

          <!-- Task Content -->
          <div class="card-body">
            <div class="card-header">
              <span class="task-title" [routerLink]="['/tasks', task.taskItemId]" [queryParams]="{mode: 'view'}"
                style="cursor: pointer;">{{ task.title }}</span>
              <div style="position: relative;">
                <button type="button" mat-icon-button class="card-menu-btn"
                  (mousedown)="toggleMenu($event, task.taskItemId)">
                  <mat-icon>more_vert</mat-icon>
                </button>
                <!-- Custom Dropdown Menu -->
                <div class="custom-mfe-dropdown" *ngIf="activeMenuId === task.taskItemId"
                  (click)="$event.stopPropagation()">
                  <ng-container *ngIf="task.projectStatus !== 4">
                    <button class="dropdown-item" *ngIf="task.status !== 1" (click)="moveTask(task, 1); closeMenu()">
                      <mat-icon>list_alt</mat-icon> Move to To Do
                    </button>
                    <button class="dropdown-item" *ngIf="task.status !== 2" (click)="moveTask(task, 2); closeMenu()">
                      <mat-icon>pending</mat-icon> Move to In Progress
                    </button>
                    <button class="dropdown-item" *ngIf="task.status !== 3" (click)="moveTask(task, 3); closeMenu()">
                      <mat-icon>rate_review</mat-icon> Move to Review
                    </button>
                    <button class="dropdown-item" *ngIf="task.status !== 4" (click)="moveTask(task, 4); closeMenu()">
                      <mat-icon>check_circle</mat-icon> Mark Complete
                    </button>
                    <button class="dropdown-item" *ngIf="task.status !== 5" (click)="moveTask(task, 5); closeMenu()">
                      <mat-icon>pause_circle</mat-icon> Put On Hold
                    </button>
                    <div class="dropdown-divider"></div>
                  </ng-container>
                  <button class="dropdown-item" [routerLink]="['/tasks', task.taskItemId]"
                    [queryParams]="{mode: 'view'}" (click)="closeMenu()">
                    <mat-icon>open_in_new</mat-icon> View Details
                  </button>
                  <button class="dropdown-item" *ngIf="canEditTask && task.projectStatus !== 4" [routerLink]="['/tasks', task.taskItemId]"
                    [queryParams]="{mode: 'edit'}" (click)="closeMenu()">
                    <mat-icon>edit</mat-icon> Edit
                  </button>
                </div>
              </div>
            </div>

            <div class="card-footer-jira">
              <div class="card-type-key" [routerLink]="['/tasks', task.taskItemId]" [queryParams]="{mode: 'view'}"
                style="cursor: pointer;">
                <mat-icon class="jira-type-icon" [style.color]="getTaskTypeColor(task.taskType)">
                  {{ getTaskTypeIcon(task.taskType) }}
                </mat-icon>
                <span class="jira-key">TSK-{{ task.taskItemId }}</span>
              </div>

              <div class="mini-avatar" *ngIf="task.assignedToEmployeeName"
                [style.background]="getAvatarColor(task.assignedToEmployeeId)"
                [matTooltip]="task.assignedToEmployeeName" title="{{ task.assignedToEmployeeName }}">
                {{ getInitials(task.assignedToEmployeeName) }}
              </div>
            </div>
          </div>
        </div>

        <div class="empty-col" *ngIf="!col.tasks.length">
          <mat-icon>inbox</mat-icon>
          <span>No tasks here</span>
        </div>
      </div>

    </div>
  </div>

</div>
